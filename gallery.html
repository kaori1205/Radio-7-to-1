<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RADIO 7 TO 1 — Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bad+Script&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/retro-computer" rel="stylesheet">
  <style>
    :root { --blue:#123685; --blue-deep:#0d2868; --cream:#fbf8f2; --white:#ffffff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { min-height:100%; }
    body {
      background:var(--cream); color:var(--blue);
      font-family:'Space Mono',monospace;
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; padding:0px 0 70px;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(18,54,133,.015) 2px,rgba(18,54,133,.015) 4px);
      pointer-events:none; z-index:999;
    }
    .page { width:100%; max-width:640px; padding:0 18px; }
    @media (min-width:900px) {
      .page { max-width:1600px; padding:0 32px; }
    }

    /* back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; letter-spacing: 2px; color: var(--blue);
      text-decoration: none; opacity: .55; transition: opacity .15s;
      margin: 22px 0 18px;
    }
    .back-link:hover { opacity: 1; }
    @media (min-width:900px) {
      .back-link { margin: 28px 0 22px; }
    }

    .gallery-header { text-align:center; margin-bottom:26px; }
    .gallery-eyebrow { font-size:9px; letter-spacing:4px; opacity:.4; margin-bottom:10px; }
    h1 {
      font-family:'Retro Computer','Press Start 2P',sans-serif;
      font-size:clamp(28px,8vw,46px); letter-spacing:1px; margin:0; line-height:1.3; font-weight:400;
    }
    .real-name { font-size:9px; letter-spacing:4px; opacity:.4; margin-top:2px; }

    /* photo grid — hiện tất cả ảnh cùng lúc, dạng masonry theo tỉ lệ gốc */
    .photo-grid {
      column-width: 210px;
      column-gap: 14px;
      margin-bottom: 30px;
    }
    .photo-item {
      break-inside: avoid;
      margin-bottom: 14px;
      border: 2px dotted var(--blue); border-radius: 12px;
      overflow: hidden; background: rgba(18,54,133,.06);
      animation: fadeInUp .4s ease both;
    }
    .photo-item img { width:100%; height:auto; display:block; }

    .gallery-empty-state {
      text-align:center; font-size:10px; letter-spacing:3px; opacity:.35;
      padding: 60px 0; font-family:'Space Mono',monospace;
    }

    @media (max-width:480px) { .photo-grid { column-width: 150px; column-gap: 10px; } }

    .not-found { text-align:center; font-size:11px; letter-spacing:1px; opacity:.6; margin-top:40px; }

    /* photo item click affordance */
    .photo-item { cursor: zoom-in; }
    .photo-item img { transition: transform .2s ease; }
    .photo-item:hover img { transform: scale(1.03); }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(13,40,104,.92);
      display: none; align-items: center; justify-content: center;
      padding: 16px;
      opacity: 0; transition: opacity .2s ease;
    }
    .lightbox.open { display: flex; }
    .lightbox.show { opacity: 1; }
    .lightbox-figure {
      position: relative;
      max-width: min(92vw, 900px);
      max-height: 90vh;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-img {
      max-width: 100%; max-height: 90vh;
      width: auto; height: auto;
      display: block;
      border: 2px dotted var(--cream);
      border-radius: 12px;
      background: rgba(0,0,0,.15);
      transform: scale(.96);
      transition: transform .2s ease;
    }
    .lightbox.show .lightbox-img { transform: scale(1); }
    .lightbox-close {
      position: fixed; top: 16px; right: 18px;
      width: 38px; height: 38px;
      border: 1.5px dotted var(--cream); border-radius: 50%;
      background: rgba(0,0,0,.2); color: var(--cream);
      font-family: 'Space Mono', monospace; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .lightbox-close:hover { background: rgba(0,0,0,.4); }
    .lightbox-counter {
      position: fixed; top: 22px; left: 20px;
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 2px; color: var(--cream); opacity: .7;
    }
    .lightbox-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 42px; height: 42px;
      border: 1.5px dotted var(--cream); border-radius: 50%;
      background: rgba(0,0,0,.2); color: var(--cream);
      font-family: 'Space Mono', monospace; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none;
    }
    .lightbox-nav:hover { background: rgba(0,0,0,.4); }
    .lightbox-nav.prev { left: 14px; }
    .lightbox-nav.next { right: 14px; }
    @media (max-width:600px) {
      .lightbox-nav { width: 36px; height: 36px; font-size: 15px; }
      .lightbox-nav.prev { left: 6px; }
      .lightbox-nav.next { right: 6px; }
      .lightbox-close { top: 10px; right: 10px; }
      .lightbox-counter { top: 16px; left: 12px; }
    }

/* ── HEADER ── */
.r71-header {
  background: var(--cream);
  border-bottom: 1.5px dotted rgba(18,54,133,.25);
  position: sticky; top: 0; z-index: 100;
  width: 100%;
  align-self: stretch;
}
.r71-header::before {
  content: '';
  display: block; height: 3px;
  background: repeating-linear-gradient(90deg, var(--blue) 0, var(--blue) 4px, transparent 4px, transparent 9px);
  opacity: .25;
}
.r71-header-inner {
  max-width: 100%; margin: 0;
  padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px;
}
.r71-logo {
  font-family: 'Retro Computer','Press Start 2P',sans-serif;
  font-size: 13px; letter-spacing: 1px; color: var(--blue);
  text-decoration: none; line-height: 1; font-weight: 400;
  flex-shrink: 0;
}
.r71-logo span {
  font-size: 9px; letter-spacing: 3px; opacity: .45;
  display: block; margin-top: 2px; font-family: 'Space Mono', monospace;
}
.r71-nav { display: flex; align-items: center; gap: 2px; }
.r71-nav a {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 2px;
  color: var(--blue); text-decoration: none;
  padding: 6px 11px; border-radius: 20px;
  opacity: .5; transition: all .15s; white-space: nowrap;
}
.r71-nav a:hover { opacity: 1; background: rgba(18,54,133,.07); }
.r71-nav a.active { opacity: 1; background: var(--blue); color: var(--cream); }
.r71-nav a.r71-ticket {
  background: var(--blue); color: var(--cream);
  opacity: 1; margin-left: 6px; padding: 6px 13px;
}
.r71-nav a.r71-ticket:hover { background: var(--blue-deep); }
.r71-nav a.r71-ticket.active { background: var(--blue-deep); }
.r71-hamburger {
  display: none;
  background: none; border: 1.5px dotted rgba(18,54,133,.4);
  border-radius: 8px; padding: 6px 9px; cursor: pointer;
  color: var(--blue); font-size: 14px; line-height: 1;
  font-family: 'Space Mono', monospace;
}
.r71-mobile-menu {
  display: none;
  background: var(--white);
  border-bottom: 1.5px dotted rgba(18,54,133,.2);
  padding: 8px 18px 12px;
}
.r71-mobile-menu.open { display: block; }
.r71-mobile-menu a {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Space Mono', monospace;
  font-size: 11px; letter-spacing: 2px;
  color: var(--blue); text-decoration: none;
  padding: 11px 8px;
  border-bottom: 1px dotted rgba(18,54,133,.12);
  opacity: .6; transition: opacity .12s;
}
.r71-mobile-menu a:last-child { border-bottom: none; }
.r71-mobile-menu a:hover, .r71-mobile-menu a.active { opacity: 1; }
.r71-mobile-menu a.active { font-weight: 700; }
.r71-mobile-menu a .r71-micon { min-width: 20px; }
@media (max-width: 480px) {
  .r71-nav { display: none !important; }
  .r71-hamburger { display: block !important; }
}

  </style>
</head>

      "images/0-uprize/1.webp", "images/0-uprize/2.webp", "images/0-uprize/3.webp", "images/0-uprize/4.webp", "images/0-uprize/5.webp", "images/0-uprize/6.webp", "images/0-uprize/7.webp", "images/0-uprize/8.webp", "images/0-uprize/9.webp", "images/0-uprize/10.webp", "images/0-uprize/11.webp", "images/0-uprize/12.webp", "images/0-uprize/13.webp", "images/0-uprize/14.webp", "images/0-uprize/15.webp", "images/0-uprize/16.webp", "images/0-uprize/17.webp", "images/0-uprize/18.webp", "images/0-uprize/19.webp", "images/0-uprize/20.webp", "images/0-uprize/21.webp", "images/0-uprize/22.webp", "images/0-uprize/23.webp", "images/0-uprize/24.webp", "images/0-uprize/25.webp", "images/0-uprize/26.webp", "images/0-uprize/27.webp", "images/0-uprize/28.webp", "images/0-uprize/29.webp", "images/0-uprize/30.webp", "images/0-uprize/31.webp", "images/0-uprize/32.webp", "images/0-uprize/33.webp", "images/0-uprize/34.webp"
    ] }
  };
  const hostAliasEl    = document.getElementById('hostAlias');
  const hostRealNameEl = document.getElementById('hostRealName');
  const viewerSection  = document.getElementById('viewerSection');
  const photoGrid      = document.getElementById('photoGrid');

  var currentImages = [];
  var currentIndex = 0;

  // Xáo trộn ngẫu nhiên mảng ảnh (Fisher-Yates), không làm thay đổi mảng gốc
  function shuffleArray(arr) {
    var result = arr.slice();
    for (var i = result.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = result[i];
      result[i] = result[j];
      result[j] = tmp;
    }
    return result;
  }

  function renderGrid(images) {
    photoGrid.innerHTML = '';
    currentImages = images || [];
    if (!images || images.length === 0) {
      photoGrid.style.columnCount = '1';
      var empty = document.createElement('div');
      empty.className = 'gallery-empty-state';
      empty.textContent = 'CHƯA CÓ ẢNH';
      photoGrid.appendChild(empty);
      return;
    }
    photoGrid.style.columnCount = '';
    images.forEach(function(src, idx) {
      var item = document.createElement('div');
      item.className = 'photo-item';
      var img = document.createElement('img');
      img.src = src;
      img.alt = '';
      item.appendChild(img);
      item.addEventListener('click', function() { openLightbox(idx); });
      photoGrid.appendChild(item);
    });
  }

  // ── LIGHTBOX ──
  var lightbox        = document.getElementById('lightbox');
  var lightboxImg      = document.getElementById('lightboxImg');
  var lightboxClose     = document.getElementById('lightboxClose');
  var lightboxPrev      = document.getElementById('lightboxPrev');
  var lightboxNext       = document.getElementById('lightboxNext');
  var lightboxCounter    = document.getElementById('lightboxCounter');

  function updateLightboxImage() {
    lightboxImg.src = currentImages[currentIndex];
    lightboxCounter.textContent = (currentIndex + 1) + ' / ' + currentImages.length;
    var multi = currentImages.length > 1;
    lightboxPrev.style.display = multi ? 'flex' : 'none';
    lightboxNext.style.display = multi ? 'flex' : 'none';
  }

  function openLightbox(idx) {
    currentIndex = idx;
    updateLightboxImage();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    requestAnimationFrame(function() { lightbox.classList.add('show'); });
  }

  function closeLightbox() {
    lightbox.classList.remove('show');
    document.body.style.overflow = '';
    setTimeout(function() { lightbox.classList.remove('open'); }, 200);
  }

  function showPrev() {
    currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
    updateLightboxImage();
  }

  function showNext() {
    currentIndex = (currentIndex + 1) % currentImages.length;
    updateLightboxImage();
  }

  lightboxClose.addEventListener('click', closeLightbox);
  lightboxPrev.addEventListener('click', function(e) { e.stopPropagation(); showPrev(); });
  lightboxNext.addEventListener('click', function(e) { e.stopPropagation(); showNext(); });
  lightbox.addEventListener('click', function(e) {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener('keydown', function(e) {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showPrev();
    if (e.key === 'ArrowRight') showNext();
  });

  // vuốt trái/phải trên mobile
  (function() {
    var touchStartX = null;
    lightbox.addEventListener('touchstart', function(e) {
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });
    lightbox.addEventListener('touchend', function(e) {
      if (touchStartX === null) return;
      var diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 50) { diff > 0 ? showPrev() : showNext(); }
      touchStartX = null;
    }, { passive: true });
  })();

  function init() {
    var params = new URLSearchParams(window.location.search);
    var hostKey = params.get('host');
    var data = hostKey ? hostData[hostKey] : null;

    if (!data) {
      hostAliasEl.textContent = 'KHÔNG TÌM THẤY';
      hostRealNameEl.textContent = '';
      viewerSection.style.display = 'none';
      return;
    }

    hostAliasEl.textContent = hostKey;
    hostRealNameEl.textContent = data.name;
    renderGrid(shuffleArray(data.images || []));
  }

  init();
</script>
<script>
  (function() {
    var current = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.r71-nav a, .r71-mobile-menu a').forEach(function(a) {
      if (a.getAttribute('href') === current) a.classList.add('active');
    });
    var btn = document.getElementById('r71HamburgerBtn');
    var menu = document.getElementById('r71MobileMenu');
    if (btn && menu) {
      btn.addEventListener('click', function() {
        var isOpen = menu.classList.toggle('open');
        btn.textContent = isOpen ? '✕' : '☰';
      });
    }
  })();
</script>
</body>
</html>
